description: |-
  Released to SOC on 2023-10-17.

  This alert indicates that a single process on a device has been observed interacting with an unusually large number of devices using remote MS-SRVS protocol, which has methods for reading and writing information about shares.  This is consistent with many SMB enumeration programs which all interact with this pipe on the machines they target.

  This detection looks for combinations of named pipe events on the source device that indicate the process is interacting with another device using the MS-SRVS protocol, grouping by the device names the process accessed and alerting when the number of devices interacted with becomes excessive.
